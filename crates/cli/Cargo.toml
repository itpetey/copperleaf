[package]
name = "copperleaf-cli"
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"
description = "CLI for verify/export (minimal, no external deps)"

[dependencies]
copperleaf = { path = "../copperleaf" }
serde_json = "1"
serde = { version = "1", features = ["derive"] }

[[bin]]
name = "cl"
path = "src/main.rs"
