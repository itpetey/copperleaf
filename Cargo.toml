[workspace]
members = [
  "crates/analysis",
  "crates/backends/kicad",
  "crates/cli",
  "crates/copperleaf",
  "crates/core",
  "crates/edsl",
  "crates/ir",
  "crates/parts",
]

resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MPL-2.0"

[workspace.dependencies]
clap = { version = "4.6", default-features = false }
copperleaf = { path = "crates/copperleaf", default-features = false }
copperleaf-analysis = { path = "crates/analysis", default-features = false }
copperleaf-backend-kicad = {
  path = "crates/backends/kicad",
  default-features = false
}
copperleaf-core = { path = "crates/core", default-features = false }
copperleaf-edsl = { path = "crates/edsl", default-features = false }
copperleaf-ir = { path = "crates/ir", default-features = false }
copperleaf-parts = { path = "crates/parts", default-features = false }
petgraph = { version = "0.8", default-features = false }
serde = { version = "1.0", default-features = false }
serde_json = { version = "1.0", default-features = false }
uom = { version = "0.38", default-features = false }
