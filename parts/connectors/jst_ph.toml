# JST PH through-hole wire-to-board connector.
#
# The [[pin]] table below defines a *single* pin template.  The `JstPh` struct
# repeats this template N times at 2.54 mm pitch to create the full connector,
# scaling the housing footprint deterministically.

[connector]
name = "JstPh"
title = "JST PH Connector"
description = "JST PH through-hole wire-to-board connector, 2.54 mm pitch"
pitch = 2.54
pad_diameter = 1.524
drill_diameter = 0.762
housing_overhang_x = 1.27
housing_overhang_y = 3.5

[pin_template]
kind = "dio"
v_min = 0.0
v_max = 100.0
i_max = 2.0
rotation = 0.0
length = 5.08
