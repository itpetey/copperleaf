[component]
name = "W5500"
title = "WIZnet W5500 Hardwired TCP/IP Ethernet controller with integrated 10/100 PHY (48-LQFP)."
description = "WIZnet W5500 Ethernet controller"

# Ethernet PHY analog differential pairs
[[pin]]
num = 1
name = "TXN"
purpose = "Ethernet PHY"
notes = "Differential transmit (negative)"
kind = "analog_rf"

[[pin]]
num = 2
name = "TXP"
purpose = "Ethernet PHY"
notes = "Differential transmit (positive)"
kind = "analog_rf"

[[pin]]
num = 3
name = "AGND"
purpose = "Analog ground"
kind = "gnd"

[[pin]]
num = 4
name = "AVDD"
purpose = "Analog supply"
notes = "Analog 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 5
name = "RXN"
purpose = "Ethernet PHY"
notes = "Differential receive (negative)"
kind = "analog_rf"

[[pin]]
num = 6
name = "RXP"
purpose = "Ethernet PHY"
notes = "Differential receive (positive)"
kind = "analog_rf"

[[pin]]
num = 7
name = "DNC"
purpose = "Do not connect"
notes = "Do not connect"
kind = "dio"

[[pin]]
num = 8
name = "AVDD"
purpose = "Analog supply"
notes = "Analog 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 9
name = "AGND"
purpose = "Analog ground"
kind = "gnd"

[[pin]]
num = 10
name = "EXRES1"
purpose = "PHY bias"
notes = "External reference resistor; 12.4kΩ 1% to AGND"
kind = "analog_in"

[[pin]]
num = 11
name = "AVDD"
purpose = "Analog supply"
notes = "Analog 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 12
name = "NC"
purpose = "No connect"
notes = "Do not connect"
kind = "dio"

[[pin]]
num = 13
name = "NC"
purpose = "No connect"
notes = "Do not connect"
kind = "dio"

[[pin]]
num = 14
name = "AGND"
purpose = "Analog ground"
kind = "gnd"

[[pin]]
num = 15
name = "AVDD"
purpose = "Analog supply"
notes = "Analog 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 16
name = "AGND"
purpose = "Analog ground"
kind = "gnd"

[[pin]]
num = 17
name = "AVDD"
purpose = "Analog supply"
notes = "Analog 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 18
name = "VBG"
purpose = "Band gap reference"
notes = "Band gap output, ~1.2V at 25°C; leave floating"
kind = "analog_in"

[[pin]]
num = 19
name = "AGND"
purpose = "Analog ground"
kind = "gnd"

[[pin]]
num = 20
name = "TOCAP"
purpose = "Reference capacitor"
notes = "External reference capacitor; 4.7µF to AGND, keep trace short"
kind = "analog_in"

[[pin]]
num = 21
name = "AVDD"
purpose = "Analog supply"
notes = "Analog 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 22
name = "1V2O"
purpose = "Regulator output"
notes = "1.2V regulator output; 10nF to GND"
kind = "pwr_out"
v = 1.2
i = 0.01

[[pin]]
num = 23
name = "RSVD"
purpose = "Reserved"
notes = "Must be tied to GND"
kind = "dio"

# LED indicator outputs
[[pin]]
num = 24
name = "SPDLED"
purpose = "Speed LED"
notes = "Low: 100Mbps, High: 10Mbps"
kind = "dio"

[[pin]]
num = 25
name = "LINKLED"
purpose = "Link LED"
notes = "Low: link established, High: no link"
kind = "dio"

[[pin]]
num = 26
name = "DUPLED"
purpose = "Duplex LED"
notes = "Low: full-duplex, High: half-duplex"
kind = "dio"

[[pin]]
num = 27
name = "ACTLED"
purpose = "Active LED"
notes = "Low: carrier sense during TX/RX activity"
kind = "dio"

# Digital power/ground
[[pin]]
num = 28
name = "VDD"
purpose = "Digital supply"
notes = "Digital 3.3V power"
kind = "pwr"
v_min = 2.97
v_max = 3.63
i_max = 0.15

[[pin]]
num = 29
name = "GND"
purpose = "Digital ground"
kind = "gnd"

# Crystal oscillator
[[pin]]
num = 30
name = "XI/CLKIN"
purpose = "Crystal"
notes = "25MHz crystal input or external 3.3V clock input"
kind = "clk"
bw_mhz = 25.0

[[pin]]
num = 31
name = "XO"
purpose = "Crystal"
notes = "25MHz crystal output; float when using external clock on XI/CLKIN"
kind = "clk"
bw_mhz = 25.0

# SPI interface (slave; supports Mode 0 and 3, ~33MHz practical)
[[pin]]
num = 32
name = "SCSn"
purpose = "SPI"
notes = "Active-low SPI chip select (internal pull-up)"
kind = "spi"
bw_mhz = 33.0

[[pin]]
num = 33
name = "SCLK"
purpose = "SPI"
notes = "SPI clock input"
kind = "clk"
bw_mhz = 33.0

[[pin]]
num = 34
name = "MISO"
purpose = "SPI"
notes = "SPI master in / slave out; high-Z when SCSn high"
kind = "spi"
bw_mhz = 33.0

[[pin]]
num = 35
name = "MOSI"
purpose = "SPI"
notes = "SPI master out / slave in"
kind = "spi"
bw_mhz = 33.0

# Control / interrupt
[[pin]]
num = 36
name = "INTn"
purpose = "Interrupt"
notes = "Active-low interrupt output"
kind = "dio"

[[pin]]
num = 37
name = "RSTn"
purpose = "Reset"
notes = "Active-low reset, hold low ≥500µs (internal pull-up)"
kind = "dio"

# Reserved (internal pull-down, leave unconnected)
[[pin]]
num = 38
name = "RSVD"
purpose = "Reserved"
notes = "NC, internal pull-down"
kind = "dio"

[[pin]]
num = 39
name = "RSVD"
purpose = "Reserved"
notes = "NC, internal pull-down"
kind = "dio"

[[pin]]
num = 40
name = "RSVD"
purpose = "Reserved"
notes = "NC, internal pull-down"
kind = "dio"

[[pin]]
num = 41
name = "RSVD"
purpose = "Reserved"
notes = "NC, internal pull-down"
kind = "dio"

[[pin]]
num = 42
name = "RSVD"
purpose = "Reserved"
notes = "NC, internal pull-down"
kind = "dio"

# PHY operation mode select (internal pull-ups; 111 = all capable, auto-neg)
[[pin]]
num = 43
name = "PMODE2"
purpose = "PHY mode"
notes = "PHY operation mode select bit 2 (pull-up)"
kind = "dio"

[[pin]]
num = 44
name = "PMODE1"
purpose = "PHY mode"
notes = "PHY operation mode select bit 1 (pull-up)"
kind = "dio"

[[pin]]
num = 45
name = "PMODE0"
purpose = "PHY mode"
notes = "PHY operation mode select bit 0 (pull-up)"
kind = "dio"

[[pin]]
num = 46
name = "NC"
purpose = "No connect"
notes = "Do not connect"
kind = "dio"

[[pin]]
num = 47
name = "NC"
purpose = "No connect"
notes = "Do not connect"
kind = "dio"

[[pin]]
num = 48
name = "AGND"
purpose = "Analog ground"
kind = "gnd"

[[constraint]]
type = "Decoupling"
values = ["100.0.nf()", "10.0.uf()"]
per_pin = false

[[constraint]]
type = "MaxJunction"
temp = "125.0.celsius()"
